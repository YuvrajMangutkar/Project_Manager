{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AIPM - Agentic AI Project Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Vite built assets -->
    <link rel="stylesheet" href="{% static 'dist/assets/main.css' %}">
    
  </head>
  <body class="bg-secondary text-white font-inter">
    <!-- Required for Django CSRF in React POSTs -->
    <script>
      // Make sure csrf token is in cookie
      document.cookie = "csrftoken={{ csrf_token }}; path=/";
    </script>
    <div id="root"></div>
    <script type="module" src="{% static 'dist/assets/main.js' %}"></script>
  </body>
</html>
