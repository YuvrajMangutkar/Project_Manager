<!DOCTYPE html>
<html>
<head>
    <title>Create Project</title>
</head>
<body>

    <h1>Create New Project</h1>

    <form method="POST">
        {% csrf_token %}

        <label>Project Goal:</label><br>
        <input type="text" name="goal" required style="width:300px;"><br><br>

        <label>Total Days:</label><br>
        <input type="number" name="total_days" required><br><br>

        <button type="submit">Generate Plan</button>
    </form>

    <br>
    <a href="{% url 'dashboard' %}">Back to Dashboard</a>

</body>
</html>
