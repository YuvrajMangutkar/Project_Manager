{% extends 'base.html' %}

{% block title %}Sign Up | AIPM{% endblock %}
{% block page_title %}Create Account{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
    <div class="glass-panel" style="width: 100%; max-width: 450px; padding: 2.5rem;">
        <h2 style="text-align: center; margin-bottom: 2rem;">Join AIPM</h2>

        <form method="POST">
            {% csrf_token %}

            <!-- Django renders the form fields simply, so we apply styles via CSS cascading or looping through fields if needed. For simplicity, we just render form.as_p and style p tags globally or wrap it. -->
            <div class="django-form-wrapper" style="margin-bottom: 1.5rem;">
                {{ form.as_p }}
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign Up</button>
        </form>

        <div style="text-align: center; margin-top: 2rem;">
            <p style="color: var(--text-secondary); font-size: 0.875rem;">
                Already have an account? 
                <a href="{% url 'login' %}" style="color: var(--accent-blue); font-weight: 500;">Login here</a>
            </p>
        </div>
    </div>
</div>

<style>
    /* target django form rendering to match our style */
    .django-form-wrapper p {
        margin-bottom: 1rem;
        color: var(--text-secondary);
        font-size: 0.875rem;
        font-weight: 500;
    }
    
    .django-form-wrapper input,
    .django-form-wrapper select,
    .django-form-wrapper textarea {
        width: 100%;
        padding: 0.75rem 1rem;
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid var(--glass-border);
        border-radius: var(--border-radius);
        color: var(--text-primary);
        font-family: inherit;
        font-size: 1rem;
        transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
        margin-top: 0.5rem;
    }

    .django-form-wrapper input:focus,
    .django-form-wrapper select:focus,
    .django-form-wrapper textarea:focus {
        outline: none;
        border-color: var(--accent-blue);
        box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
    }
    
    .django-form-wrapper .helptext {
        font-size: 0.75rem;
        color: var(--text-secondary);
        display: block;
        margin-top: 0.25rem;
    }
    
    .errorlist {
        color: #fca5a5;
        font-size: 0.875rem;
        margin-bottom: 0.5rem;
        list-style-type: none;
        padding-left: 0;
    }
</style>
{% endblock %}
